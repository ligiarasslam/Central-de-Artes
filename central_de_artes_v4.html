<div id="app"></div>

<script>
const TIPOS=["Arte para Instagram","Arte para WhatsApp","Arte para folder / panfleto","PDF informativo de produtos","Arte para representante","Papel timbrado","Divulgação de vaga","Assinatura de e-mail","Informativo interno","Edição de vídeo","Sinalização interna","Arte para sacaria","Cotação de fornecedor + arte","Demanda estratégica (planejamento)","Outros"];
const ONDE=["Instagram Feed","Instagram Stories","WhatsApp (clientes)","WhatsApp (grupos)","E-mail","Uso interno","Impresso / Físico","Outros"];
const FUNCOES=["Consultor(a)","RH","Diretoria","Gerência","Marketing","Outros"];
const ST={
  aguardando_prazo:{l:"Aguardando prazo",bg:"#F4F4F0",tc:"#666",col:"#AAA",stripe:"#CCC"},
  a_iniciar:       {l:"À iniciar",       bg:"#F5F3FF",tc:"#6B21A8",col:"#7C3AED",stripe:"#7C3AED"},
  em_producao:     {l:"Em produção",     bg:"#EFF6FF",tc:"#1E40AF",col:"#2563EB",stripe:"#2563EB"},
  enviar_aprovacao:{l:"Enviar p/ aprovação",bg:"#FFFBEB",tc:"#92400E",col:"#D97706",stripe:"#D97706"},
  em_aprovacao:    {l:"Em aprovação/aguardando",bg:"#ECFEFF",tc:"#155E75",col:"#0891B2",stripe:"#0891B2"},
  aprovado:        {l:"Aprovado",        bg:"#ECFDF5",tc:"#065F46",col:"#059669",stripe:"#059669"},
  revisao:         {l:"Em revisão",      bg:"#FEF2F2",tc:"#991B1B",col:"#DC2626",stripe:"#DC2626"},
};
const G_COLS=["aguardando_prazo","a_iniciar","em_producao","enviar_aprovacao","em_aprovacao","aprovado","revisao"];
const S_COLS=["aguardando_prazo","a_iniciar","em_producao","em_aprovacao","aprovado"];
const S_PILLS=["all","aguardando_prazo","a_iniciar","em_producao","em_aprovacao","aprovado"];
const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DIAS_S=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const PIN="1234";

let D=[],nome="",admin=false,showF=false,showP=false,pinV="",pinE=false;
let fstt="all",femp="all",fmeus=false,fsrc="",sortBy="desejado";
let view="lista",calY=new Date().getFullYear(),calM=new Date().getMonth();
let detailId=null,revisaoMode=false,commText="",delId=null,loading=true;
let form=ef(),ferr={};

function ef(){return{nome:"",funcao:"",empresa:"",tipo:"",tipoO:"",onde:[],ondeO:"",prazoD:"",info:"",eN:"",eC:"",eE:"",eT:""};}

async function loadAll(){
  try{const d=await window.storage.get("artes_v4");if(d)D=JSON.parse(d.value);}catch{}
  try{const n=await window.storage.get("artes_nome");if(n)nome=n.value;}catch{}
  loading=false;render();
}
async function saveD(){try{await window.storage.set("artes_v4",JSON.stringify(D));}catch{}}
async function saveN(v){try{await window.storage.set("artes_nome",v);}catch{}}

function fd(ts){if(!ts)return"—";return new Date(ts).toLocaleDateString("pt-BR");}
function fdt(ts){if(!ts)return"—";return new Date(ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
function fdi(v){if(!v)return"—";const[y,m,d]=v.split("-");return`${d}/${m}/${y}`;}
function atras(d){if(!d.prazoD||d.status==="aprovado")return false;return new Date(d.prazoD)<new Date();}
function devt(a,b){if(!a||!b)return null;const diff=b-a,days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000);if(days===0)return`${hrs}h de desenvolvimento`;if(days===1)return"1 dia de desenvolvimento";return`${days} dias de desenvolvimento`;}
function gid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function autor(){return nome||(admin?"Gestão":"Anônimo");}

function solCol(s){if(s==="revisao")return"aguardando_prazo";if(s==="enviar_aprovacao")return"em_producao";return s;}
function solBadge(s){if(s==="enviar_aprovacao")return"em_producao";return s;}
function solFil(s){if(s==="revisao")return"aguardando_prazo";if(s==="enviar_aprovacao")return"em_producao";return s;}

function sortArr(arr){
  return[...arr].sort((a,b)=>{
    const da=sortBy==="desejado"?(a.prazoD?new Date(a.prazoD):new Date("9999")):(a.prazoR?new Date(a.prazoR):new Date("9999"));
    const db=sortBy==="desejado"?(b.prazoD?new Date(b.prazoD):new Date("9999")):(b.prazoR?new Date(b.prazoR):new Date("9999"));
    return da-db;
  });
}
function matchF(d){
  if(femp!=="all"&&d.empresa!==femp)return false;
  if(fmeus&&nome&&d.nome.toLowerCase().trim()!==nome.toLowerCase().trim())return false;
  if(fsrc&&!d.nome.toLowerCase().includes(fsrc.toLowerCase()))return false;
  if(fstt!=="all"){const k=admin?d.status:solFil(d.status);if(k!==fstt)return false;}
  return true;
}
function canComm(d){return admin||(nome&&d.nome.toLowerCase().trim()===nome.toLowerCase().trim());}
function canAppr(d){return d.status==="em_aprovacao"&&(admin||(nome&&d.nome.toLowerCase().trim()===nome.toLowerCase().trim()));}

function addH(d,tipo,data){if(!d.historico)d.historico=[];d.historico.push({ts:Date.now(),tipo,...data,autor:autor()});}

function chgStatus(d,ns){
  const old=d.status;const now=Date.now();
  const u={...d,status:ns};
  if(ns==="em_producao"&&!d.ini)u.ini=now;
  if(ns==="aprovado")u.aprovadoEm=now;
  if(!u.historico)u.historico=[];
  u.historico.push({ts:now,tipo:"status",de:old,para:ns,autor:autor()});
  return u;
}

function render(){document.getElementById("app").innerHTML=buildApp();ev();}

function buildApp(){
  if(loading)return`<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#888">Carregando...</div>`;
  const envCnt=D.filter(d=>d.status==="enviar_aprovacao").length;
  const fil=sortArr(D.filter(matchF));
  const pKeys=admin?["all",...Object.keys(ST)]:S_PILLS;
  const cnt={all:D.length};
  pKeys.filter(k=>k!=="all").forEach(k=>{cnt[k]=D.filter(d=>admin?d.status===k:solFil(d.status)===k).length;});
  const det=detailId?D.find(d=>d.id===detailId):null;
  return`
<header class="hdr">
  <div><div class="hdr-logo">Central de Artes</div><div class="hdr-sub">Germisul · Pasto Brasil</div></div>
  <div class="hdr-r">
    ${nome?`<span style="font-size:13px;color:#888">Olá, <strong style="color:#F5F5F3">${x(nome.split(" ")[0])}</strong></span>`:""}
    <div style="display:flex;gap:4px">
      <button class="vbtn ${view==="lista"?"on":""}" onclick="setView('lista')">≡ Lista</button>
      <button class="vbtn ${view==="kanban"?"on":""}" onclick="setView('kanban')">▦ Kanban</button>
      <button class="vbtn ${view==="cal"?"on":""}" onclick="setView('cal')">▦ Calendário</button>
    </div>
    <button class="btn-g ${admin?"on":""}" id="btn-g">${admin?"✓ Gestão":"Gestão"}</button>
    <button class="btn-sol" id="btn-s">+ Solicitar</button>
  </div>
</header>
<div class="toolbar">
  ${pKeys.map(k=>{const L=k==="all"?`Todas (${cnt.all})`:`${ST[k]?ST[k].l:k} (${cnt[k]||0})`;return`<button class="pill ${fstt===k?"on":""}" data-fs="${k}">${L}</button>`;}).join("")}
  <div class="tb-r">
    <select class="sel" id="sel-emp"><option value="all" ${femp==="all"?"selected":""}>Todas empresas</option><option value="Germisul" ${femp==="Germisul"?"selected":""}>Germisul</option><option value="Pasto Brasil" ${femp==="Pasto Brasil"?"selected":""}>Pasto Brasil</option></select>
    <select class="sel" id="sel-sort"><option value="desejado" ${sortBy==="desejado"?"selected":""}>↑ Prazo desejado</option><option value="real" ${sortBy==="real"?"selected":""}>↑ Prazo real</option></select>
    ${nome?`<button class="btn-meus ${fmeus?"on":""}" id="btn-m">Meus pedidos</button>`:""}
    <input class="srch" id="srch" placeholder="Buscar nome..." value="${x(fsrc)}"/>
  </div>
</div>
${admin&&envCnt>0?`<div class="banner">⚡ ${envCnt} demanda${envCnt>1?"s":""} aguardando envio para aprovação<button class="bnr-btn" onclick="goEnvAprov()">Ver todas</button></div>`:""}
${!nome?`<div class="userbar"><span class="userbar-lbl">Para filtrar seus pedidos, informe seu nome:</span><input id="inp-n" class="uinp" placeholder="Seu nome..."/><button class="ubtn" onclick="setNome()">Confirmar</button></div>`:""}
${view==="lista"?bLista(fil):view==="kanban"?bKanban():bCal()}
${det?bDetail(det):""}
${showF?bForm():""}
${showP?bPin():""}`;
}

function bLista(fil){
  if(!fil.length)return`<div class="cw"><div class="empty"><div style="font-size:44px">📋</div><h3>${D.length===0?"Nenhuma demanda ainda":"Nenhum resultado"}</h3><p>${D.length===0?"Clique em Solicitar para começar":"Tente ajustar os filtros"}</p></div></div>`;
  return`<div class="snote">Ordenado por: <strong style="color:#555">${sortBy==="desejado"?"prazo desejado":"prazo real"}</strong> · clique no card para ver detalhes completos</div><div class="cw"><div class="cgrid">${fil.map(d=>bCard(d,false)).join("")}</div></div>`;
}

function bCard(d,compact){
  const ds=admin?d.status:solBadge(d.status);
  const s=ST[ds]||ST.aguardando_prazo;
  const isG=d.empresa==="Germisul";
  const sc=isG?"#1A7A38":"#1550A8";
  const tl=d.tipo==="Outros"?(d.tipoO||"Outros"):(d.tipo||"—");
  const at=atras(d);
  const dt=devt(d.ini,d.aprovadoEm);
  const isAprov=d.status==="em_aprovacao";
  if(compact){
    return`<div class="kcard" onclick="openDet('${d.id}')">
${isAprov?`<div class="aicon">!</div>`:""}
<div class="kcinn"><div class="kst" style="background:${sc}"></div>
<div class="kbd">
<div class="kbdgs"><span class="ebdg ${isG?"g":"p"}" style="font-size:10px;padding:1px 6px">${x(d.empresa||"—")}</span>${d.responsavel&&admin?`<span class="rbdg ${d.responsavel==="Lígia"?"li":"ru"}" style="font-size:10px;padding:1px 6px">${x(d.responsavel)}</span>`:""}</div>
<div class="kname">${x(d.nome)}</div><div class="ktipo">${x(tl)}</div>
${at?`<div style="font-size:10px;color:#B91C1C;font-weight:700;margin-bottom:3px">⚠ Vencido</div>`:""}
<div class="kdts">📅 <strong>${fdi(d.prazoD)}</strong>${d.prazoR?` · <strong>${fdi(d.prazoR)}</strong>`:""}</div>
</div></div></div>`;
  }
  const tagsH=d.onde&&d.onde.length?`<div class="otags">${d.onde.map(o=>`<span class="otag">${x(o==="Outros"?(d.ondeO||"Outros"):o)}</span>`).join("")}</div>`:"";
  const hasInfo=d.info&&d.info.trim();
  return`<div class="card ${d.status==="aprovado"?"dim":""}" data-cid="${d.id}">
${isAprov?`<div class="aicon">!</div>`:""}
<div class="cinn"><div class="stripe" style="background:${sc}"></div>
<div class="cbody">
<div class="ctop"><div><div class="cname">${x(d.nome)}</div><div class="cbdgs"><span class="ebdg ${isG?"g":"p"}">${x(d.empresa||"—")}</span>${d.funcao?`<span class="fbdg">${x(d.funcao)}</span>`:""}${d.responsavel&&admin?`<span class="rbdg ${d.responsavel==="Lígia"?"li":"ru"}">${x(d.responsavel)}</span>`:""}</div></div>
<span class="sbdg" style="background:${s.bg};color:${s.tc}">${s.l}</span></div>
<div class="ctipo">${x(tl)}</div>${tagsH}
${at?`<div class="atag">⚠ Prazo vencido</div>`:""}
<div class="cdts"><span>📅 Desejado: <strong>${fdi(d.prazoD)}</strong></span>${d.prazoR?`<span>⚡ <span class="prl">Real: ${fdi(d.prazoR)}</span></span>`:""}</div>
${dt?`<div class="dtlbl">✓ ${x(dt)}</div>`:""}
${hasInfo?`<div class="iprev">${x(d.info)}</div><div class="vmais">Ver detalhes →</div>`:""}
<div class="cftr"><span>Enviado ${fd(d.criado)}</span>${d.ini?`<span style="color:#9AB8F5">Iniciado ${fd(d.ini)}</span>`:""}</div>
</div></div>
${admin?bAstrip(d):""}
</div>`;
}

function bAstrip(d){
  return`<div class="astrip" onclick="event.stopPropagation()">
<div class="amlbl">GESTÃO RÁPIDA</div>
<div class="prow"><label>Prazo real:</label><input type="date" value="${d.prazoR||""}" onchange="setPR('${d.id}',this.value)"/></div>
<div class="sbrow">
${Object.entries(ST).map(([k,v])=>{const act=d.status===k;return`<button class="qsbtn" style="${act?`background:${v.bg};color:${v.tc};border-color:${v.col};font-weight:700`:""}" onclick="setStt('${d.id}','${k}')">${v.l}</button>`;}).join("")}
${delId===d.id?`<span style="font-size:11px;color:#EF4444;display:flex;align-items:center;gap:5px;margin-left:auto">Confirmar?<button onclick="doDel('${d.id}')" style="background:#EF4444;color:white;border:none;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:700">Sim</button><button onclick="noDel()" style="background:#F5F5F5;border:1px solid #DDD;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'Manrope',sans-serif">Não</button></span>`:`<button class="bdel" onclick="askDel('${d.id}')">Excluir</button>`}
</div></div>`;
}

function bKanban(){
  const cols=admin?G_COLS:S_COLS;
  const fil=D.filter(matchF);
  return`<div class="kanban-w"><div class="kboard">${cols.map(ck=>{
    const s=ST[ck];
    const colCards=sortArr(fil.filter(d=>(admin?d.status:solCol(d.status))===ck));
    const spec=ck==="revisao"||ck==="enviar_aprovacao";
    return`<div class="kcol col-${ck}">
<div class="khead" style="${spec?"":(`background:${s.bg}`)}"><span class="khtitle" style="color:${s.tc}">${s.l}</span><span class="khcnt" style="color:${s.tc}">${colCards.length}</span></div>
<div class="kbody">${colCards.length===0?`<div style="font-size:12px;color:#CCC;text-align:center;padding:14px 0">Vazio</div>`:""}${colCards.map(d=>bCard(d,true)).join("")}</div>
</div>`;
  }).join("")}</div></div>`;
}

function bCal(){
  const fd1=new Date(calY,calM,1),ld=new Date(calY,calM+1,0);
  const sdow=fd1.getDay(),dim=ld.getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const fil=D.filter(matchF);
  const dm={};
  fil.forEach(d=>{if(!d.prazoR)return;const dt=new Date(d.prazoR);if(dt.getFullYear()===calY&&dt.getMonth()===calM){const day=dt.getDate();if(!dm[day])dm[day]=[];dm[day].push(d);}});
  let cells=[];
  for(let i=0;i<sdow;i++){const pd=new Date(calY,calM,-(sdow-i-1));cells.push({day:pd.getDate(),curr:false});}
  for(let d=1;d<=dim;d++)cells.push({day:d,curr:true});
  const rem=(7-cells.length%7)%7;
  for(let i=1;i<=rem;i++)cells.push({day:i,curr:false});
  return`<div class="cal-w">
<div class="cal-nav"><button class="cal-nb" onclick="calPrev()">←</button><div class="cal-mo">${MESES[calM]} ${calY}</div><button class="cal-nb" onclick="calNext()">→</button><span style="font-size:12px;color:#AAA;margin-left:8px">Cards com prazo real definido</span></div>
<div class="cagrid">
${DIAS_S.map(d=>`<div class="cahdr">${d}</div>`).join("")}
${cells.map(cell=>{
  const todayF=cell.curr&&new Date(calY,calM,cell.day).getTime()===today.getTime();
  const cards=cell.curr?(dm[cell.day]||[]):[];
  return`<div class="cacell ${!cell.curr?"om":""} ${todayF?"td":""}">
<div class="caday">${cell.day}</div>
${cards.slice(0,3).map(d=>{const isG=d.empresa==="Germisul";const tl=d.tipo==="Outros"?(d.tipoO||""):d.tipo||"";return`<div class="cachip" style="background:${isG?"#1A7A38":"#1550A8"}" onclick="openDet('${d.id}')" title="${x(d.nome)} · ${x(tl)}">${x(d.nome.split(" ")[0])} · ${x(tl.length>12?tl.slice(0,12)+"…":tl)}</div>`;}).join("")}
${cards.length>3?`<div class="camore">+${cards.length-3} mais</div>`:""}
</div>`;
}).join("")}
</div></div>`;
}

function bDetail(d){
  const ds=admin?d.status:solBadge(d.status);
  const s=ST[ds]||ST.aguardando_prazo;
  const isG=d.empresa==="Germisul";
  const tl=d.tipo==="Outros"?(d.tipoO||"Outros"):(d.tipo||"—");
  const at=atras(d);
  const dt=devt(d.ini,d.aprovadoEm);
  const isAss=d.tipo==="Assinatura de e-mail";
  const infoE=isAss&&(d.eN||d.eE)?`\nColaborador: ${d.eN||"—"}  |  Cargo: ${d.eC||"—"}\nE-mail: ${d.eE||"—"}${d.eT?" | Tel: "+d.eT:""}` :"";
  const fullInfo=(d.info||"")+infoE;
  const cc=canComm(d);
  const ca=canAppr(d);
  const hist=d.historico||[];
  const comments=hist.filter(h=>h.tipo==="comentario");
  return`
<div class="ovl" id="ovl-det" onclick="closeDEvt(event)">
<div class="dmodal">
<div class="dhead">
  <div>
    <div class="dname">${x(d.nome)}</div>
    <div class="dbdgs">
      <span class="ebdg ${isG?"g":"p"}" style="font-size:11px;padding:3px 10px">${x(d.empresa||"—")}</span>
      ${d.funcao?`<span class="fbdg" style="font-size:11px;padding:3px 10px">${x(d.funcao)}</span>`:""}
      ${d.responsavel&&admin?`<span class="rbdg ${d.responsavel==="Lígia"?"li":"ru"}" style="font-size:11px;padding:3px 10px">${x(d.responsavel)}</span>`:""}
      <span class="sbdg" style="background:${s.bg};color:${s.tc};font-size:11px;padding:3px 10px">${s.l}</span>
    </div>
  </div>
  <button class="bx" onclick="closeDet()">×</button>
</div>
<div class="dbody">
<div class="dsec"><div class="dslbl">Tipo de peça</div><div class="dtipo">${x(tl)}</div></div>
${d.onde&&d.onde.length?`<div class="dsec"><div class="dslbl">Onde vai ser publicado</div><div class="dtgs">${d.onde.map(o=>`<span class="dtg">${x(o==="Outros"?(d.ondeO||"Outros"):o)}</span>`).join("")}</div></div>`:""}
<div class="dsec"><div class="dslbl">Prazos e datas</div>
<div class="dmg">
<div class="dmi"><div class="dmil">Prazo desejado</div><div class="dmiv ${at?"rd":""}">${fdi(d.prazoD)}${at?" · ⚠ vencido":""}</div></div>
<div class="dmi"><div class="dmil">Prazo real</div><div class="dmiv ${d.prazoR?"gr":""}">${d.prazoR?fdi(d.prazoR):"—"}</div></div>
<div class="dmi"><div class="dmil">Solicitado em</div><div class="dmiv">${fd(d.criado)}</div></div>
<div class="dmi"><div class="dmil">Início da produção</div><div class="dmiv">${d.ini?fd(d.ini):"—"}</div></div>
</div></div>
${dt?`<div class="dsec"><div class="ddev">✓ ${x(dt)}</div></div>`:""}
${isAss&&(d.eN||d.eE)?`<div class="dsec"><div class="dslbl">Dados da assinatura</div><div class="deg"><div class="dei"><div class="deil">Nome</div>${x(d.eN||"—")}</div><div class="dei"><div class="deil">Cargo</div>${x(d.eC||"—")}</div><div class="dei"><div class="deil">E-mail</div>${x(d.eE||"—")}</div><div class="dei"><div class="deil">Telefone</div>${x(d.eT||"—")}</div></div></div>`:""}
<div class="dsec"><div class="dslbl">Informações e observações</div>${fullInfo.trim()?`<div class="dinb">${x(fullInfo.trim())}</div>`:`<div class="dine">Nenhuma observação informada.</div>`}</div>
${ca?`<div class="dsec"><div class="dslbl">Sua avaliação</div>
<div class="apbox">
<div class="ap-msg">Esta demanda foi finalizada e está aguardando sua aprovação. Revise e indique se aprova ou precisa de ajustes.</div>
${!revisaoMode?`<div class="ap-btns"><button class="btn-aprov" onclick="doAprovado('${d.id}')">✓ Aprovar</button><button class="btn-rev" id="btn-rev-t">Solicitar revisão</button></div>`:`
<div class="rev-hint">✏ Quais ajustes você precisa que sejam feitos?</div>
<textarea id="rev-ta" class="cinp rmode" rows="4" placeholder="Quais ajustes você precisa que sejam feitos?">${x(commText)}</textarea>
<div class="cacts"><button class="bsend-c" onclick="cancelRev()">Cancelar</button><button class="bsend rv" onclick="doRevisao('${d.id}')">Confirmar revisão</button></div>`}
</div></div>`:""}
${admin?`<div class="dsec gsec"><div class="dslbl">Gestão</div>
<div class="rrow"><label>Responsável:</label><select class="rsel" id="rsel" onchange="setResp('${d.id}',this.value)"><option value="" ${!d.responsavel?"selected":""}>Não definido</option><option value="Lígia" ${d.responsavel==="Lígia"?"selected":""}>Lígia</option><option value="Rute" ${d.responsavel==="Rute"?"selected":""}>Rute</option></select></div>
<div class="prow" style="margin-bottom:11px"><label style="font-size:12px;color:#666;font-weight:500;min-width:76px">Prazo real:</label><input type="date" id="det-pr" value="${d.prazoR||""}" onchange="setPRDet('${d.id}',this.value)" style="flex:1;border:1px solid #D8D2C5;border-radius:7px;padding:8px 11px;font-size:13px;font-family:'Manrope',sans-serif"/></div>
<div class="gstbtns">${Object.entries(ST).map(([k,v])=>{const act=d.status===k;return`<button class="gstbtn" style="${act?`background:${v.bg};color:${v.tc};border-color:${v.col};font-weight:700`:""}" onclick="setSttDet('${d.id}','${k}')">${v.l}</button>`;}).join("")}</div>
</div>`:""}
${cc?`<div class="dsec"><div class="dslbl">Comentários</div>
${comments.length>0?`<div class="cth">${comments.map(h=>`<div class="citem"><div class="cauthor">${x(h.autor)}<span class="cts">${fdt(h.ts)}</span></div><div class="ctxt">${x(h.texto)}</div></div>`).join("")}</div>`:""}
${!revisaoMode?`<textarea id="comm-ta" class="cinp" rows="3" placeholder="Escreva um comentário..." oninput="commText=this.value">${x(commText)}</textarea>
<div class="cacts"><button class="bsend" onclick="sendComm('${d.id}')">Enviar comentário</button></div>`:""}
</div>`:""}
<div class="dsec"><div class="dslbl">Histórico</div>
<div class="htl">
${hist.length===0?`<div style="font-size:13px;color:#BBB;font-style:italic">Nenhum evento registrado.</div>`:""}
${[...hist].reverse().map(h=>{
  let dc="",desc="",ico="·";
  if(h.tipo==="criacao"){dc="cr";desc="Solicitação criada";ico="✦";}
  else if(h.tipo==="status"){dc="st";desc=`${ST[h.de]?ST[h.de].l:h.de} → <strong>${ST[h.para]?ST[h.para].l:h.para}</strong>`;ico="↓";}
  else if(h.tipo==="prazo"){dc="pr";desc=`Prazo real: <strong>${fdi(h.valor)}</strong>`;ico="📅";}
  else if(h.tipo==="comentario"){dc="cm";desc="Comentário";ico="💬";}
  return`<div class="hi"><div class="hdot ${dc}">${ico}</div><div class="hcon"><span class="hwho">${x(h.autor)}</span><span class="hts">${fdt(h.ts)}</span><div class="hdesc">${desc}</div>${h.tipo==="comentario"?`<div class="hctxt">${x(h.texto)}</div>`:""}</div></div>`;
}).join("")}
</div></div>
</div></div></div>`;
}

  const isAss=form.tipo==="Assinatura de e-mail";
  return`<div class="ovlb" id="ovl-f" onclick="if(event.target.id==='ovl-f'){showF=false;render();}">
<div class="fmodal">
<div class="fhd"><div><div class="ftit">Nova solicitação</div><div class="fsub">Preencha com o máximo de detalhes para agilizar a produção</div></div><button class="bx" id="bxf">×</button></div>
<div class="fgr">
<div class="fld"><label>Nome *</label><input id="fn" value="${x(form.nome)}" placeholder="Nome completo" class="${ferr.nome?"e":""}"/>${ferr.nome?`<div class="ferr">Campo obrigatório</div>`:""}</div>
<div class="fld"><label>Função *</label><select id="ffn" class="${ferr.funcao?"e":""}"><option value="">Selecione...</option>${FUNCOES.map(f=>`<option value="${x(f)}" ${form.funcao===f?"selected":""}>${x(f)}</option>`).join("")}</select>${ferr.funcao?`<div class="ferr">Campo obrigatório</div>`:""}</div>

<div class="fld"><label>Prazo desejado *</label><input type="date" id="fpd" value="${x(form.prazoD)}" class="${ferr.prazoD?"e":""}"/>${ferr.prazoD?`<div class="ferr">Campo obrigatório</div>`:""}</div>
<div class="fld fc2"><label>Tipo de peça *</label><select id="ftipo" class="${ferr.tipo?"e":""}"><option value="">Selecione o tipo...</option>${TIPOS.map(t=>`<option value="${x(t)}" ${form.tipo===t?"selected":""}>${x(t)}</option>`).join("")}</select>${ferr.tipo?`<div class="ferr">Campo obrigatório</div>`:""}${form.tipo==="Outros"?`<input id="ftipo-o" value="${x(form.tipoO)}" placeholder="Descreva o tipo de peça..." style="margin-top:9px;width:100%;border:1px solid #D8D2C5;border-radius:8px;padding:10px 13px;font-size:14px;font-family:'Manrope',sans-serif"/>`:``}</div>
${isAss?`<hr class="fsep fc2"/><div class="fc2"><div class="felbl">Dados para assinatura de e-mail</div></div><div class="fld"><label>Nome do colaborador</label><input id="fen" value="${x(form.eN)}" placeholder="Nome completo"/></div><div class="fld"><label>Cargo</label><input id="fec" value="${x(form.eC)}" placeholder="Ex: Analista de Vendas"/></div><div class="fld"><label>E-mail</label><input id="fee" value="${x(form.eE)}" placeholder="colaborador@empresa.com.br"/></div><div class="fld"><label>Telefone (opcional)</label><input id="fet" value="${x(form.eT)}" placeholder="(67) 9 9999-9999"/></div><hr class="fsep fc2"/>`:""}
<div class="fld fc2"><label>Onde vai ser publicado / usado</label><div class="chips">${ONDE.map(o=>`<button type="button" class="chip ${form.onde.includes(o)?"on":""}" data-onde="${x(o)}">${x(o)}</button>`).join("")}</div>${form.onde.includes("Outros")?`<input id="fondo" value="${x(form.ondeO)}" placeholder="Onde será usado?" style="margin-top:9px;width:100%;border:1px solid #D8D2C5;border-radius:8px;padding:10px 13px;font-size:14px;font-family:'Manrope',sans-serif"/>`:``}</div>
<div class="fld fc2"><label>Informações e observações</label><textarea id="finfo" rows="5" placeholder="Explique com detalhes o que precisa:

}

function bPin(){
  return`<div class="ovl"><div class="pinbox"><div class="ptit">Modo Gestão</div><div class="psub">Digite o PIN para acessar os controles de gestão.</div><input type="password" id="pinp" class="pinp ${pinE?"e":""}" value="${x(pinV)}" placeholder="••••" maxlength="10"/>${pinE?`<div class="perr">PIN incorreto.</div>`:""}<div class="pbtns"><button class="pcanc" id="pcanc">Cancelar</button><button class="pok" id="pok">Entrar</button></div></div></div>`;

function ev(){
  el("btn-s")?.addEventListener("click",()=>{form=ef();if(nome)form.nome=nome;ferr={};showF=true;render();});
  el("btn-g")?.addEventListener("click",()=>{if(admin){admin=false;render();}else{showP=true;pinV="";pinE=false;render();}});
  qsa("[data-fs]").forEach(b=>b.addEventListener("click",e=>{fstt=e.target.dataset.fs;render();}));
  el("sel-emp")?.addEventListener("change",e=>{femp=e.target.value;render();});
  el("sel-sort")?.addEventListener("change",e=>{sortBy=e.target.value;render();});
  el("btn-m")?.addEventListener("click",()=>{fmeus=!fmeus;render();});
  el("srch")?.addEventListener("input",e=>{fsrc=e.target.value;render();});
  el("inp-n")?.addEventListener("keydown",e=>{if(e.key==="Enter")setNome();});
  qsa("[data-cid]").forEach(c=>c.addEventListener("click",e=>{if(e.target.closest(".astrip"))return;openDet(c.dataset.cid);}));
  el("bxf")?.addEventListener("click",()=>{showF=false;render();});
  el("bcanc")?.addEventListener("click",()=>{showF=false;render();});
  el("bsub2")?.addEventListener("click",()=>submitForm());
  el("fn")?.addEventListener("input",e=>{form.nome=e.target.value;});
  el("ffn")?.addEventListener("change",e=>{form.funcao=e.target.value;});
  el("femp")?.addEventListener("change",e=>{form.empresa=e.target.value;});
  el("fpd")?.addEventListener("change",e=>{form.prazoD=e.target.value;});
  el("ftipo")?.addEventListener("change",e=>{form.tipo=e.target.value;const i=el("finfo")?.value;render();if(i&&el("finfo"))el("finfo").value=i;});
  el("ftipo-o")?.addEventListener("input",e=>{form.tipoO=e.target.value;});
  el("finfo")?.addEventListener("input",e=>{form.info=e.target.value;});
  el("fondo")?.addEventListener("input",e=>{form.ondeO=e.target.value;});
  el("fen")?.addEventListener("input",e=>{form.eN=e.target.value;});
  el("fec")?.addEventListener("input",e=>{form.eC=e.target.value;});
  el("fee")?.addEventListener("input",e=>{form.eE=e.target.value;});
  el("fet")?.addEventListener("input",e=>{form.eT=e.target.value;});
  qsa("[data-onde]").forEach(b=>b.addEventListener("click",e=>{
    const o=e.target.dataset.onde,i=form.onde.indexOf(o);
    if(i===-1)form.onde.push(o);else form.onde.splice(i,1);
    const inf=el("finfo")?.value;render();if(inf&&el("finfo"))el("finfo").value=inf;
  }));
  el("pinp")?.addEventListener("input",e=>{pinV=e.target.value;pinE=false;});
  el("pinp")?.addEventListener("keydown",e=>{if(e.key==="Enter")doPin();});
  el("pcanc")?.addEventListener("click",()=>{showP=false;render();});
  el("pok")?.addEventListener("click",()=>doPin());
  if(showP)setTimeout(()=>el("pinp")?.focus(),50);
  el("ovl-det")?.addEventListener("click",closeDEvt);
  el("btn-rev-t")?.addEventListener("click",()=>{revisaoMode=true;commText="";render();setTimeout(()=>{const t=el("rev-ta");if(t){t.focus();}},60);});
  el("comm-ta")?.addEventListener("input",e=>{commText=e.target.value;});
  el("rev-ta")?.addEventListener("input",e=>{commText=e.target.value;});
}

function el(id){return document.getElementById(id);}
function qsa(s){return document.querySelectorAll(s);}

window.setNome=function(){const v=(el("inp-n")?.value||"").trim();if(v){nome=v;saveN(v);render();}};
window.setView=function(v){view=v;render();};
window.calPrev=function(){calM--;if(calM<0){calM=11;calY--;}render();};
window.calNext=function(){calM++;if(calM>11){calM=0;calY++;}render();};
window.goEnvAprov=function(){fstt="enviar_aprovacao";render();};
window.openDet=function(id){detailId=id;revisaoMode=false;commText="";render();};
window.closeDet=function(){detailId=null;revisaoMode=false;commText="";render();};
window.closeDEvt=function(e){if(e.target.id==="ovl-det")closeDet();};
window.cancelRev=function(){revisaoMode=false;commText="";render();};

window.setStt=function(id,ns){
  D=D.map(d=>d.id===id?chgStatus(d,ns):d);
  saveD();render();
};
window.setSttDet=function(id,ns){
  D=D.map(d=>d.id===id?chgStatus(d,ns):d);
  saveD();
  const upd=D.find(d=>d.id===id);
  if(upd){detailId=id;render();}
};
window.setPR=function(id,val){
  if(!val)return;
  D=D.map(d=>{if(d.id!==id)return d;const u={...d,prazoR:val};if(!u.historico)u.historico=[];u.historico.push({ts:Date.now(),tipo:"prazo",valor:val,autor:autor()});return u;});
  saveD();
};
window.setPRDet=function(id,val){
  if(!val)return;
  D=D.map(d=>{if(d.id!==id)return d;const u={...d,prazoR:val};if(!u.historico)u.historico=[];u.historico.push({ts:Date.now(),tipo:"prazo",valor:val,autor:autor()});return u;});
  saveD();
};
window.setResp=function(id,val){
  D=D.map(d=>d.id===id?{...d,responsavel:val}:d);saveD();
};
window.doAprovado=function(id){
  D=D.map(d=>d.id===id?chgStatus(d,"aprovado"):d);
  saveD();detailId=null;render();
};
window.doRevisao=function(id){
  const txt=(el("rev-ta")?.value||commText).trim();
  D=D.map(d=>{if(d.id!==id)return d;let u=chgStatus(d,"revisao");if(txt){if(!u.historico)u.historico=[];u.historico.push({ts:Date.now(),tipo:"comentario",texto:txt,autor:autor()});}return u;});
  saveD();revisaoMode=false;commText="";detailId=null;render();
};
window.sendComm=function(id){
  const txt=(el("comm-ta")?.value||commText).trim();
  if(!txt)return;
  D=D.map(d=>{if(d.id!==id)return d;const u={...d};if(!u.historico)u.historico=[];u.historico.push({ts:Date.now(),tipo:"comentario",texto:txt,autor:autor()});return u;});
  saveD();commText="";render();
};
window.askDel=function(id){delId=id;render();};
window.noDel=function(){delId=null;render();};
window.doDel=function(id){D=D.filter(d=>d.id!==id);delId=null;if(detailId===id)detailId=null;saveD();render();};

function doPin(){const v=el("pinp")?.value||pinV;if(v===PIN){admin=true;showP=false;render();}else{pinE=true;pinV="";render();}}

function submitForm(){
  const ta=el("finfo");if(ta)form.info=ta.value;
  form.nome=(el("fn")?.value||"").trim();form.funcao=el("ffn")?.value||"";form.empresa=el("femp")?.value||"";form.tipo=el("ftipo")?.value||"";form.prazoD=el("fpd")?.value||"";
  if(el("ftipo-o"))form.tipoO=el("ftipo-o").value;
  if(el("fen"))form.eN=el("fen").value;if(el("fec"))form.eC=el("fec").value;if(el("fee"))form.eE=el("fee").value;if(el("fet"))form.eT=el("fet").value;
  if(el("fondo"))form.ondeO=el("fondo").value;
  const e={};
  if(!form.nome)e.nome=true;if(!form.funcao)e.funcao=true;if(!form.empresa)e.empresa=true;if(!form.tipo)e.tipo=true;if(!form.prazoD)e.prazoD=true;
  ferr=e;if(Object.keys(e).length){render();return;}
  const nd={id:gid(),...form,status:"aguardando_prazo",criado:Date.now(),ini:null,aprovadoEm:null,prazoR:null,responsavel:"",
    historico:[{ts:Date.now(),tipo:"criacao",autor:form.nome}]};
  D=[nd,...D];
  if(form.nome&&!nome){nome=form.nome;saveN(form.nome);}
  saveD();showF=false;form=ef();ferr={};render();
}

loadAll();
</script>
